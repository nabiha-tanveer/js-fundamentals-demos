<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Counter App  Nabiha Tanveer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f0f4ff;
    }

    /* ── Top navbar ── */
    .navbar {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.06);
    }

    .navbar .brand {
      font-size: 1rem;
      font-weight: 700;
      color: #4f46e5;
      letter-spacing: 0.5px;
    }

    .navbar .brand span {
      color: #94a3b8;
      font-weight: 400;
      font-size: 0.85rem;
      margin-left: 10px;
    }

    .navbar .badge {
      background: #eef2ff;
      color: #4f46e5;
      border: 1px solid #c7d2fe;
      border-radius: 99px;
      padding: 4px 14px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      padding: 50px 60px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(79, 70, 229, 0.08);
      width: 100%;
      max-width: 380px;
    }

    h1 {
      color: #64748b;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    #count-display {
      font-size: 7rem;
      font-weight: 700;
      color: #1e293b;
      line-height: 1;
      margin-bottom: 10px;
      transition: transform 0.1s ease, color 0.3s ease;
    }

    #count-display.positive {
      color: #16a34a;
    }

    #count-display.negative {
      color: #dc2626;
    }

    #count-display.zero {
      color: #1e293b;
    }

    #count-display.bump {
      transform: scale(1.15);
    }

    #status-text {
      color: #94a3b8;
      font-size: 0.85rem;
      margin-bottom: 44px;
      height: 20px;
    }

    .btn-group {
      display: flex;
      gap: 14px;
      justify-content: center;
      margin-bottom: 16px;
    }

    button {
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:active {
      transform: scale(0.95);
    }

    .btn-dec {
      background: #fff1f2;
      color: #dc2626;
      border: 1.5px solid #fecdd3;
      padding: 16px 28px;
      font-size: 1.5rem;
    }

    .btn-dec:hover {
      background: #ffe4e6;
      box-shadow: 0 4px 16px rgba(220, 38, 38, 0.15);
    }

    .btn-inc {
      background: #f0fdf4;
      color: #16a34a;
      border: 1.5px solid #bbf7d0;
      padding: 16px 28px;
      font-size: 1.5rem;
    }

    .btn-inc:hover {
      background: #dcfce7;
      box-shadow: 0 4px 16px rgba(22, 163, 74, 0.15);
    }

    .btn-reset {
      background: #f8fafc;
      color: #94a3b8;
      border: 1.5px solid #e2e8f0;
      padding: 12px 36px;
      font-size: 0.8rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      width: 100%;
    }

    .btn-reset:hover {
      background: #f1f5f9;
      color: #64748b;
    }

    #history {
      margin-top: 28px;
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
      max-width: 280px;
      margin-left: auto;
      margin-right: auto;
    }

    .hist-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      opacity: 0.7;
    }

   
    footer {
      text-align: center;
      padding: 16px;
      color: #cbd5e1;
      font-size: 0.75rem;
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="brand">Nabiha Tanveer <span>JS Fundamentals</span></div>
    <div class="badge">Counter App</div>
  </nav>

  <main>
    <div class="card">
      <h1>Counter</h1>
      <div id="count-display" class="zero">0</div>
      <p id="status-text">Start counting!</p>

      <div class="btn-group">
        <button class="btn-dec" id="dec">−</button>
        <button class="btn-inc" id="inc">＋</button>
      </div>

      <button class="btn-reset" id="reset">Reset</button>
      <div id="history"></div>
    </div>
  </main>

  <footer>Nabiha Tanveer </footer>

  <script>
    function createCounter(initialValue = 0) {
      var count = initialValue;
      var history = [];
      return {
        increment() { count++; history.push(1); return count; },
        decrement() { count--; history.push(-1); return count; },
        reset() { count = initialValue; history = []; return count; },
        getCount() { return count; },
        getHistory() { return [...history]; }
      };
    }

    const counter = createCounter(0);
    const display = document.getElementById('count-display');
    const statusText = document.getElementById('status-text');
    const historyDiv = document.getElementById('history');

    function updateDisplay(newVal) {
      display.textContent = newVal;
      display.classList.remove('positive', 'negative', 'zero');
      if (newVal > 0) display.classList.add('positive');
      else if (newVal < 0) display.classList.add('negative');
      else display.classList.add('zero');

      display.classList.add('bump');
      setTimeout(() => display.classList.remove('bump'), 100);

      const messages = {
        positive: [newVal > 10 ? "Going high! 🚀" : "Positive vibes ✅"],
        negative: [newVal < -10 ? "Way below zero ❄️" : "Below zero 📉"],
        zero: ["Back to zero!"]
      };
      const type = newVal > 0 ? 'positive' : newVal < 0 ? 'negative' : 'zero';
      statusText.textContent = messages[type][0];

      historyDiv.innerHTML = '';
      counter.getHistory().slice(-20).forEach(h => {
        const dot = document.createElement('div');
        dot.className = 'hist-dot';
        dot.style.background = h > 0 ? '#16a34a' : '#dc2626';
        historyDiv.appendChild(dot);
      });
    }

    document.getElementById('inc').addEventListener('click', () => updateDisplay(counter.increment()));
    document.getElementById('dec').addEventListener('click', () => updateDisplay(counter.decrement()));
    document.getElementById('reset').addEventListener('click', () => {
      updateDisplay(counter.reset());
      statusText.textContent = 'Reset! Start again.';
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowUp') updateDisplay(counter.increment());
      if (e.key === 'ArrowDown') updateDisplay(counter.decrement());
      if (e.key === 'r') { updateDisplay(counter.reset()); statusText.textContent = 'Reset!'; }
    });
  </script>
</body>

</html>
