<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JS Quiz Nabiha Tanveer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body 
    {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f0f4ff;
    }

    .navbar
     {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.06);
    }

    .navbar .brand 
    {
      font-size: 1rem;
      font-weight: 700;
      color: #0369a1;
    }

    .navbar .brand span 
    {
      color: #94a3b8;
      font-weight: 400;
      font-size: 0.85rem;
      margin-left: 10px;
    }

    .navbar .badge
     {
      background: #f0f9ff;
      color: #0369a1;
      border: 1px solid #bae6fd;
      border-radius: 99px;
      padding: 4px 14px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    main
     {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .container
     {
      width: 100%;
      max-width: 580px;
    }

    .progress-bar-wrap 
    {
      background: #e2e8f0;
      border-radius: 99px;
      height: 6px;
      margin-bottom: 24px;
      overflow: hidden;
    }

    #progress-bar 
    {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #38bdf8, #0369a1);
      transition: width 0.5s ease;
      width: 0%;
    }

    .quiz-header
     {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    #q-counter
     {
      color: #64748b;
      font-size: 0.85rem;
    }

    #score-badge 
    {
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      color: #0369a1;
      padding: 5px 14px;
      border-radius: 99px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .card 
    {
      background: #fff;
      border: 1.5px solid #e2e8f0;
      border-radius: 22px;
      padding: 36px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
    }

    #question-text {
      color: #1e293b;
      font-size: 1.15rem;
      font-weight: 600;
      line-height: 1.6;
      margin-bottom: 28px;
      white-space: pre-line;
    }

    #options-list 
    {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option-btn {
      width: 100%;
      text-align: left;
      padding: 14px 18px;
      background: #f8fafc;
      border: 1.5px solid #e2e8f0;
      border-radius: 14px;
      color: #334155;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .option-btn:hover:not(:disabled) {
      background: #f0f9ff;
      border-color: #7dd3fc;
      transform: translateX(3px);
    }

    .option-btn .opt-letter {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #e2e8f0;
      border: 1px solid #cbd5e1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .option-btn.correct {
      background: #f0fdf4;
      border-color: #86efac;
      color: #15803d;
    }

    .option-btn.correct .opt-letter {
      background: #16a34a;
      border-color: #16a34a;
      color: #fff;
    }

    .option-btn.wrong {
      background: #fff1f2;
      border-color: #fca5a5;
      color: #dc2626;
    }

    .option-btn.wrong .opt-letter 
    {
      background: #dc2626;
      border-color: #dc2626;
      color: #fff;
    }

    #feedback {
      margin-top: 18px;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 0.88rem;
      display: none;
      line-height: 1.5;
    }

    #feedback.show {
      display: block;
    }

    #feedback.correct {
      background: #f0fdf4;
      color: #15803d;
      border: 1px solid #bbf7d0;
    }

    #feedback.wrong {
      background: #fff1f2;
      color: #dc2626;
      border: 1px solid #fecdd3;
    }

    #next-btn 
    {
      width: 100%;
      margin-top: 18px;
      padding: 14px;
      background: linear-gradient(135deg, #0369a1, #0284c7);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: none;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 2px 10px rgba(3, 105, 161, 0.25);
    }

    #next-btn:hover 
    {
      opacity: 0.9;
    }

    #next-btn:active {
      transform: scale(0.98);
    }

    #next-btn.visible {
      display: block;
    }

    #loading {
      text-align: center;
      padding: 60px 0;
      display: none;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e2e8f0;
      border-top-color: #0369a1;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 14px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #loading p {
      color: #94a3b8;
      font-size: 0.85rem;
    }

    /* Result */
    #result-screen {
      display: none;
      text-align: center;
    }

    .result-emoji {
      font-size: 4.5rem;
      margin-bottom: 16px;
    }

    .result-title {
      color: #1e293b;
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .result-sub {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    .score-ring {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: conic-gradient(#0369a1 0%, #e2e8f0 0%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      position: relative;
    }

    .score-ring::before {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      background: #fff;
    }

    .score-ring span {
      position: relative;
      font-size: 1.8rem;
      font-weight: 700;
      color: #1e293b;
    }

    .result-breakdown {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 24px;
      text-align: left;
    }

    .breakdown-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #f1f5f9;
      color: #64748b;
      font-size: 0.88rem;
    }

    .breakdown-row:last-child {
      border: none;
    }

    .breakdown-row span:last-child {
      color: #1e293b;
      font-weight: 600;
    }

    #restart-btn {
      padding: 13px 40px;
      background: linear-gradient(135deg, #0369a1, #0284c7);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(3, 105, 161, 0.25);
    }

    #restart-btn:hover {
      opacity: 0.9;
    }

    footer {
      text-align: center;
      padding: 16px;
      color: #cbd5e1;
      font-size: 0.75rem;
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="brand">Nabiha Tanveer <span>JS Fundamentals</span></div>
    <div class="badge">Quiz App</div>
  </nav>

  <main>
    <div class="container">

      <div id="quiz-screen">
        <div class="progress-bar-wrap">
          <div id="progress-bar"></div>
        </div>
        <div class="quiz-header">
          <span id="q-counter">Question 1 of 7</span>
          <span id="score-badge">Score: 0</span>
        </div>
        <div class="card">
          <p id="question-text">Loading...</p>
          <ul id="options-list"></ul>
          <div id="feedback"></div>
          <button id="next-btn">Next Question →</button>
        </div>
        <div id="loading">
          <div class="spinner"></div>
          <p>Loading next question...</p>
        </div>
      </div>

      <div id="result-screen">
        <div class="card">
          <div class="result-emoji" id="result-emoji">🏆</div>
          <div class="result-title" id="result-title">Quiz Complete!</div>
          <div class="result-sub" id="result-sub">Here's how you did</div>
          <div class="score-ring" id="score-ring"><span id="score-fraction">0/7</span></div>
          <div class="result-breakdown">
            <div class="breakdown-row"><span>✅ Correct</span><span id="r-correct">0</span></div>
            <div class="breakdown-row"><span>❌ Wrong</span><span id="r-wrong">0</span></div>
            <div class="breakdown-row"><span>⏱ Time Taken</span><span id="r-time">0s</span></div>
            <div class="breakdown-row"><span>📊 Percentage</span><span id="r-percent">0%</span></div>
          </div>
          <button id="restart-btn">🔄 Try Again</button>
        </div>
      </div>

    </div>
  </main>

  <footer>Nabiha Tanveer </footer>

  <script>
    const questions = [
      { q: "What is the output of: console.log(typeof null)?", options: ['"null"', '"object"', '"undefined"', '"string"'], correct: 1, explanation: "Correct! typeof null returns 'object' — this is a famous JS bug never fixed for backward compatibility." },
      { q: "Which of the following is an example of a CLOSURE?", options: ["function f() { return 42; }", "const add = (a,b) => a + b", "function outer() { let x=10; return function inner() { return x; } }", "let arr = [1,2,3]"], correct: 2, explanation: "Correct! A closure is when an inner function remembers variables from its outer function's scope." },
      { q: "What does 'hoisting' mean in JavaScript?", options: ["Moving HTML elements up the page", "Variable and function declarations are moved to the top of their scope before execution", "A way to upload files to a server", "Increasing the z-index of elements"], correct: 1, explanation: "Correct! JS moves declarations (not assignments) to the top of their scope before running." },
      { q: "Which method adds a new element to the END of an array?", options: ["array.unshift()", "array.append()", "array.push()", "array.add()"], correct: 2, explanation: "Correct! .push() adds to the end. .unshift() adds to the beginning." },
      { q: "What does DOM stand for?", options: ["Document Object Model", "Data Output Method", "Dynamic Object Manipulation", "Document Orientation Mode"], correct: 0, explanation: "Correct! DOM = Document Object Model — the tree structure representing an HTML page in memory." },
      { q: "What is a Promise in JavaScript?", options: ["A guarantee code runs without errors", "An object representing the eventual completion or failure of an async operation", "A synchronous function that returns a value immediately", "A reserved keyword for variables"], correct: 1, explanation: "Correct! A Promise represents a future value — it can be pending, fulfilled, or rejected." },
      { q: "What will this print?\n\nconsole.log(1);\nsetTimeout(() => console.log(2), 0);\nconsole.log(3);", options: ["1, 2, 3", "2, 1, 3", "1, 3, 2", "3, 2, 1"], correct: 2, explanation: "Correct! setTimeout is async — even with 0ms delay it runs AFTER the main thread. Output: 1, 3, 2." }
    ];

    let currentQ = 0, score = 0, answered = false, wrongCount = 0, startTime = Date.now();

    function delay(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

    async function loadQuestion(index) {
      document.getElementById('loading').style.display = 'block';
      document.querySelector('.card').style.display = 'none';
      await delay(500);
      document.getElementById('loading').style.display = 'none';
      document.querySelector('.card').style.display = 'block';
      renderQuestion(index);
    }

    function renderQuestion(index) {
      const q = questions[index];
      answered = false;
      document.getElementById('q-counter').textContent = `Question ${index + 1} of ${questions.length}`;
      document.getElementById('score-badge').textContent = `Score: ${score}`;
      document.getElementById('progress-bar').style.width = (index / questions.length * 100) + '%';
      document.getElementById('question-text').textContent = q.q;

      const optList = document.getElementById('options-list');
      optList.innerHTML = '';
      ['A', 'B', 'C', 'D'].forEach((letter, i) => {
        const li = document.createElement('li');
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `<span class="opt-letter">${letter}</span> ${q.options[i]}`;
        btn.addEventListener('click', () => handleAnswer(i, btn));
        li.appendChild(btn);
        optList.appendChild(li);
      });

      const fb = document.getElementById('feedback');
      fb.className = 'feedback'; fb.style.display = 'none';
      document.getElementById('next-btn').classList.remove('visible');
    }

    function handleAnswer(selectedIndex, clickedBtn) {
      if (answered) return;
      answered = true;
      const q = questions[currentQ];
      const allBtns = document.querySelectorAll('.option-btn');
      allBtns.forEach(b => b.disabled = true);
      const isCorrect = selectedIndex === q.correct;
      const fb = document.getElementById('feedback');
      if (isCorrect) {
        score++;
        clickedBtn.classList.add('correct');
        fb.className = 'feedback show correct';
        fb.style.display = 'block';
        fb.textContent = '✅ ' + q.explanation;
      } else {
        wrongCount++;
        clickedBtn.classList.add('wrong');
        allBtns[q.correct].classList.add('correct');
        fb.className = 'feedback show wrong';
        fb.style.display = 'block';
        fb.textContent = '❌ ' + q.explanation;
      }
      document.getElementById('score-badge').textContent = `Score: ${score}`;
      const nextBtn = document.getElementById('next-btn');
      nextBtn.classList.add('visible');
      if (currentQ === questions.length - 1) nextBtn.textContent = 'See Results 🏁';
    }

    document.getElementById('next-btn').addEventListener('click', async () => {
      currentQ++;
      if (currentQ < questions.length) await loadQuestion(currentQ);
      else showResult();
    });

    function showResult() {
      const timeTaken = Math.round((Date.now() - startTime) / 1000);
      const percent = Math.round((score / questions.length) * 100);
      document.getElementById('quiz-screen').style.display = 'none';
      document.getElementById('result-screen').style.display = 'block';
      let emoji, title, sub;
      if (percent >= 86) { emoji = '🏆'; title = 'Excellent!'; sub = 'You really know your JavaScript!'; }
      else if (percent >= 57) { emoji = '⭐'; title = 'Good Job!'; sub = "Keep practicing and you'll ace it!"; }
      else { emoji = '📚'; title = 'Keep Learning!'; sub = 'Review the concepts and try again.'; }
      document.getElementById('result-emoji').textContent = emoji;
      document.getElementById('result-title').textContent = title;
      document.getElementById('result-sub').textContent = sub;
      document.getElementById('score-fraction').textContent = `${score}/${questions.length}`;
      document.getElementById('r-correct').textContent = score;
      document.getElementById('r-wrong').textContent = wrongCount;
      document.getElementById('r-time').textContent = timeTaken + 's';
      document.getElementById('r-percent').textContent = percent + '%';
      document.getElementById('score-ring').style.background = `conic-gradient(#0369a1 ${percent * 3.6}deg, #e2e8f0 0deg)`;
      document.getElementById('progress-bar').style.width = '100%';
    }

    document.getElementById('restart-btn').addEventListener('click', () => {
      currentQ = 0; score = 0; wrongCount = 0; startTime = Date.now();
      document.getElementById('result-screen').style.display = 'none';
      document.getElementById('quiz-screen').style.display = 'block';
      loadQuestion(0);
    });

    delay(100).then(() => loadQuestion(0));
  </script>
</body>

</html>
